<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g-notes" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="g-links" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g-tasks" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>

    <linearGradient id="g-overlap-ab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="g-overlap-bc" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#d8b4fe"/>
    </linearGradient>
    <linearGradient id="g-overlap-ac" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <radialGradient id="g-center" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e0e7ff"/>
      <stop offset="80%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0.1  0 0.7 0 0 0.05  0 0 1 0 0.2  0 0 0 0.6 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-nucleus" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feColorMatrix in="b" type="matrix"
        values="1 0 0 0 0.25  0 0.6 0 0 0.15  0 0 1 0 0.35  0 0 0 0.85 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sparkle-f" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip-a"><circle cx="214" cy="206" r="120"/></clipPath>
    <clipPath id="clip-b"><circle cx="298" cy="206" r="120"/></clipPath>
    <clipPath id="clip-c"><circle cx="256" cy="296" r="120"/></clipPath>
  </defs>

  <g filter="url(#glow-strong)">
    <circle cx="214" cy="206" r="120" fill="url(#g-notes)" opacity="0.8"/>
    <circle cx="298" cy="206" r="120" fill="url(#g-links)" opacity="0.8"/>
    <circle cx="256" cy="296" r="120" fill="url(#g-tasks)" opacity="0.8"/>
  </g>

  <g clip-path="url(#clip-a)">
    <circle cx="298" cy="206" r="120" fill="url(#g-overlap-ab)" opacity="0.55"/>
  </g>
  <g clip-path="url(#clip-b)">
    <circle cx="256" cy="296" r="120" fill="url(#g-overlap-bc)" opacity="0.5"/>
  </g>
  <g clip-path="url(#clip-c)">
    <circle cx="214" cy="206" r="120" fill="url(#g-overlap-ac)" opacity="0.45"/>
  </g>

  <g clip-path="url(#clip-a)">
    <g clip-path="url(#clip-b)">
      <circle cx="256" cy="296" r="120" fill="#818cf8" opacity="0.6"/>
    </g>
  </g>

  <g filter="url(#glow-nucleus)">
    <circle cx="256" cy="234" r="44" fill="url(#g-center)" opacity="0.75"/>
    <circle cx="256" cy="234" r="24" fill="white" opacity="0.65"/>
    <circle cx="256" cy="234" r="10" fill="white" opacity="0.95"/>
  </g>

  <g filter="url(#sparkle-f)">
    <circle cx="256" cy="146" r="4" fill="#c7d2fe" opacity="0.95"/>
    <circle cx="186" cy="270" r="3.5" fill="#a5f3fc" opacity="0.9"/>
    <circle cx="326" cy="270" r="3.5" fill="#e9d5ff" opacity="0.9"/>
    <circle cx="216" cy="180" r="2.5" fill="#bae6fd" opacity="0.75"/>
    <circle cx="296" cy="180" r="2.5" fill="#ddd6fe" opacity="0.75"/>
    <circle cx="256" cy="310" r="2.5" fill="#f0abfc" opacity="0.75"/>
  </g>

  <ellipse cx="256" cy="238" rx="155" ry="48" fill="none"
    stroke="url(#g-notes)" stroke-width="1.2" opacity="0.18"
    transform="rotate(-30 256 238)"/>
  <ellipse cx="256" cy="238" rx="155" ry="48" fill="none"
    stroke="url(#g-tasks)" stroke-width="1.2" opacity="0.15"
    transform="rotate(30 256 238)"/>
</svg>
